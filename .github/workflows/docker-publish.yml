name: Build and push GHCR

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  # GHCR / Docker image names must be lowercase
  IMAGE_NAME: ${{ github.repository }}

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lowercase image name
        run: |
          set -euo pipefail
          # github.repository may preserve owner casing (e.g. HM2899/...); Docker requires lowercase
          echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"
          echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Read APP_VERSION
        id: ver
        run: |
          set -euo pipefail
          V=$(python3 -c 'import re,pathlib; t=pathlib.Path("grok2api/app.py").read_text(encoding="utf-8"); m=re.search(r"APP_VERSION\s*=\s*\"([^\"]+)\"", t); assert m, "APP_VERSION not found"; print(m.group(1))')
          echo "app_version=$V" >> "$GITHUB_OUTPUT"
          echo "APP_VERSION=$V"

      - name: Gate tag matches APP_VERSION
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME#v}"
          APP="${{ steps.ver.outputs.app_version }}"
          echo "tag=$TAG app=$APP"
          if [[ "$TAG" != "$APP" ]]; then
            echo "ERROR: git tag v$TAG must equal APP_VERSION $APP in grok2api/app.py" >&2
            exit 1
          fi

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=raw,value=edge,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,prefix=sha-,format=short
            type=raw,value=${{ steps.ver.outputs.app_version }},enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build admin assets (optional)
        run: |
          python3 -m pip install --quiet --upgrade pip || true
          python3 scripts/build_admin_assets.py || true

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # GHCR packages default to private even when the repo is public.
      # Make the container pullable anonymously for testing / docker pull.
      - name: Make GHCR package public
        if: github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          PKG="${GITHUB_REPOSITORY##*/}"
          OWNER="${GITHUB_REPOSITORY%%/*}"
          echo "Setting package ${OWNER}/${PKG} visibility=public"
          # Prefer user package endpoint; fall back to org if needed.
          code=$(curl -sS -o /tmp/pkg_vis.json -w "%{http_code}" \
            -X PATCH \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/user/packages/container/${PKG}" \
            -d '{"visibility":"public"}' || true)
          echo "user endpoint HTTP ${code}"
          cat /tmp/pkg_vis.json || true
          if [[ "${code}" != "200" && "${code}" != "204" ]]; then
            code2=$(curl -sS -o /tmp/pkg_vis2.json -w "%{http_code}" \
              -X PATCH \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/orgs/${OWNER}/packages/container/${PKG}" \
              -d '{"visibility":"public"}' || true)
            echo "org endpoint HTTP ${code2}"
            cat /tmp/pkg_vis2.json || true
          fi
          # Anonymous pull probe (best-effort).
          tok=$(curl -sS "https://ghcr.io/token?scope=repository:${OWNER,,}/${PKG}:pull&service=ghcr.io" | python3 -c 'import sys,json; print(json.load(sys.stdin).get("token",""))' || true)
          if [[ -n "${tok}" ]]; then
            http=$(curl -sS -o /dev/null -w "%{http_code}" \
              -H "Authorization: Bearer ${tok}" \
              "https://ghcr.io/v2/${OWNER,,}/${PKG}/manifests/edge" || true)
            echo "anonymous pull probe edge -> HTTP ${http}"
          fi
